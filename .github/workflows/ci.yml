name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - uses: actions/cache@v4
      with:
        path: |
          ~/.go/pkg/mod
          ~/.go/build-cache
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Check go.mod tidy
      run: |
        go mod tidy
        git diff --exit-code
    - name: Check formatting
      run: |
        files=$(gofmt -l .)
        [ -z "$files" ] || { echo "Unformatted files: $files"; exit 1; }

  go-vet:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - uses: actions/cache@v4
      with:
        path: |
          ~/.go/pkg/mod
          ~/.go/build-cache
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Install native dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev unzip ffmpeg
        curl -fsSL https://github.com/discord/libdave/releases/download/v1.1.1/cpp/libdave-Linux-X64-boringssl.zip -o /tmp/libdave.zip
        sudo unzip -j /tmp/libdave.zip "include/dave/dave.h" -d /usr/local/include
        sudo unzip -j /tmp/libdave.zip "lib/libdave.so" -d /usr/local/lib
        sudo ldconfig
        sudo mkdir -p /usr/local/lib/pkgconfig
        printf 'prefix=/usr/local\nexec_prefix=${prefix}\nlibdir=${exec_prefix}/lib\nincludedir=${prefix}/include\n\nName: dave\nDescription: Discord DAVE E2EE\nVersion: 1.1.1\nLibs: -L${libdir} -ldave\nCflags: -I${includedir}\n' | sudo tee /usr/local/lib/pkgconfig/dave.pc > /dev/null
    - name: Check go.mod tidy
      run: |
        go mod tidy
        git diff --exit-code
    - name: Vet
      run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - uses: actions/cache@v4
      with:
        path: |
          ~/.go/pkg/mod
          ~/.go/build-cache
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Install native dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev unzip ffmpeg
        curl -fsSL https://github.com/discord/libdave/releases/download/v1.1.1/cpp/libdave-Linux-X64-boringssl.zip -o /tmp/libdave.zip
        sudo unzip -j /tmp/libdave.zip "include/dave/dave.h" -d /usr/local/include
        sudo unzip -j /tmp/libdave.zip "lib/libdave.so" -d /usr/local/lib
        sudo ldconfig
        sudo mkdir -p /usr/local/lib/pkgconfig
        printf 'prefix=/usr/local\nexec_prefix=${prefix}\nlibdir=${exec_prefix}/lib\nincludedir=${prefix}/include\n\nName: dave\nDescription: Discord DAVE E2EE\nVersion: 1.1.1\nLibs: -L${libdir} -ldave\nCflags: -I${includedir}\n' | sudo tee /usr/local/lib/pkgconfig/dave.pc > /dev/null
    - name: Check go.mod tidy
      run: |
        go mod tidy
        git diff --exit-code
    - name: Test
      run: go test ./... -v -race

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - uses: actions/cache@v4
      with:
        path: |
          ~/.go/pkg/mod
          ~/.go/build-cache
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Install native dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev unzip ffmpeg
        curl -fsSL https://github.com/discord/libdave/releases/download/v1.1.1/cpp/libdave-Linux-X64-boringssl.zip -o /tmp/libdave.zip
        sudo unzip -j /tmp/libdave.zip "include/dave/dave.h" -d /usr/local/include
        sudo unzip -j /tmp/libdave.zip "lib/libdave.so" -d /usr/local/lib
        sudo ldconfig
        sudo mkdir -p /usr/local/lib/pkgconfig
        printf 'prefix=/usr/local\nexec_prefix=${prefix}\nlibdir=${exec_prefix}/lib\nincludedir=${prefix}/include\n\nName: dave\nDescription: Discord DAVE E2EE\nVersion: 1.1.1\nLibs: -L${libdir} -ldave\nCflags: -I${includedir}\n' | sudo tee /usr/local/lib/pkgconfig/dave.pc > /dev/null
    - name: Check go.mod tidy
      run: |
        go mod tidy
        git diff --exit-code
    - name: Build
      run: go build ./...